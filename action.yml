name: "PkgSafe Dependency Gate"
description: "Detect risky npm dependency changes before they are merged into the repository"
author: "PkgSafe Team"
branding:
  icon: "shield"
  color: "blue"

inputs:
  lockfile:
    description: "Path to package-lock.json"
    required: false
    default: "package-lock.json"

  dependency-file:
    description: "Path to dependency file such as requirements.txt or pyproject.toml"
    required: false
    default: ""

  ecosystem:
    description: "Ecosystem to scan: npm, pypi, or empty for autodetect"
    required: false
    default: ""

  policy:
    description: "Path to PkgSafe policy file"
    required: false
    default: ".pkgsafe/policy.yaml"

  mode:
    description: "PkgSafe mode: audit, warn, or block"
    required: false
    default: "warn"

  fail-on:
    description: "Minimum decision that fails the workflow: none, warn, block"
    required: false
    default: "block"

  changed-only:
    description: "Only scan dependencies changed in the pull request"
    required: false
    default: "true"

  baseline:
    description: "Baseline Git ref or baseline package-lock JSON file for changed dependency detection"
    required: false
    default: "main"

  sandbox:
    description: "Run lifecycle scripts for heuristic behavior analysis (executes on the runner host without OS isolation; not a security sandbox)"
    required: false
    default: "false"

  offline:
    description: "Use offline local vulnerability database only"
    required: false
    default: "false"

  upload-sarif:
    description: "Upload SARIF results to GitHub Code Scanning"
    required: false
    default: "true"

  comment-pr:
    description: "Post or update pull request summary comment"
    required: false
    default: "true"

  registry-config:
    description: "Path to registries.yaml"
    required: false
    default: ""

  generate-evidence-pack:
    description: "Generate PkgSafe governance evidence pack"
    required: false
    default: "true"

  evidence-pack-output:
    description: "Path to generated evidence pack"
    required: false
    default: "pkgsafe-evidence-pack.zip"

  upload-evidence-artifact:
    description: "Upload evidence pack as workflow artifact"
    required: false
    default: "true"

outputs:
  decision:
    description: "Overall PkgSafe decision: allow, warn, block"
    value: ${{ steps.scan.outputs.decision }}

  risk-score:
    description: "Highest package risk score"
    value: ${{ steps.scan.outputs.risk-score }}

  packages-scanned:
    description: "Number of packages scanned"
    value: ${{ steps.scan.outputs.packages-scanned }}

  warn-count:
    description: "Number of warning packages"
    value: ${{ steps.scan.outputs.warn-count }}

  block-count:
    description: "Number of blocked packages"
    value: ${{ steps.scan.outputs.block-count }}

  json-report:
    description: "Path to JSON report"
    value: ${{ steps.scan.outputs.json-report }}

  sarif-report:
    description: "Path to SARIF report"
    value: ${{ steps.scan.outputs.sarif-report }}

  markdown-summary:
    description: "Path to Markdown summary"
    value: ${{ steps.scan.outputs.markdown-summary }}

  evidence-pack:
    description: "Path to generated evidence pack ZIP"
    value: ${{ steps.scan.outputs.evidence-pack }}

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
      with:
        go-version: '1.25.0'

    - name: Check formatting
      shell: bash
      run: |
        cd ${{ github.action_path }}
        test -z "$(gofmt -l .)" || (echo "gofmt check failed"; gofmt -l .; exit 1)

    - name: Build PkgSafe
      shell: bash
      run: |
        cd ${{ github.action_path }}
        go build -o pkgsafe ./cmd/pkgsafe
        echo "${{ github.action_path }}" >> $GITHUB_PATH

    - name: Run PkgSafe CI Scan
      id: scan
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_LOCKFILE: ${{ inputs.lockfile }}
        INPUT_DEPENDENCY_FILE: ${{ inputs.dependency-file }}
        INPUT_ECOSYSTEM: ${{ inputs.ecosystem }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_CHANGED_ONLY: ${{ inputs.changed-only }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_SANDBOX: ${{ inputs.sandbox }}
        INPUT_OFFLINE: ${{ inputs.offline }}
        INPUT_COMMENT_PR: ${{ inputs.comment-pr }}
        INPUT_REGISTRY_CONFIG: ${{ inputs.registry-config }}
        INPUT_GENERATE_EVIDENCE_PACK: ${{ inputs.generate-evidence-pack }}
        INPUT_EVIDENCE_PACK_OUTPUT: ${{ inputs.evidence-pack-output }}
        INPUT_UPLOAD_EVIDENCE_ARTIFACT: ${{ inputs.upload-evidence-artifact }}
      run: |
        ${{ github.action_path }}/scripts/github-action-entrypoint.sh

    - name: Upload PkgSafe SARIF
      if: inputs.upload-sarif == 'true' && always() && steps.scan.outputs.sarif-report != ''
      uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-report }}

    - name: Upload PkgSafe Evidence Pack
      if: inputs.generate-evidence-pack == 'true' && inputs.upload-evidence-artifact == 'true' && always() && steps.scan.outputs.evidence-pack != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: pkgsafe-evidence-pack
        path: ${{ inputs.evidence-pack-output }}

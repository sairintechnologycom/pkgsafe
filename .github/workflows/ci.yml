name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Run Tests
        run: go test -v ./...

  pkgsafe-gate:
    name: PkgSafe Package Gate Self-Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PkgSafe Dependency Gate
        uses: ./
        with:
          # Dogfood against a CLEAN lockfile so a red gate means a real
          # regression. testdata/npm/package-lock.json intentionally contains a
          # typosquat fixture and is reserved for unit tests, not this gate.
          lockfile: testdata/npm/self-scan/package-lock.json
          fail-on: block
          changed-only: false
          sandbox: false
          upload-sarif: false

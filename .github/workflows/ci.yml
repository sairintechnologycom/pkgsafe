name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # Full race-enabled test suite on the Unix platforms the CLI and the
    # behavior runner target. Windows gets a lighter build+vet job below
    # (the race detector needs a cgo toolchain and the suite is not yet
    # validated on Windows).
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run Tests (race)
        run: go test -race ./...

  build-windows:
    name: Build & Vet (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          # Build the linter from source with the runner's Go toolchain. The
          # prebuilt v1.64.8 binary is compiled with Go 1.24 and refuses to run
          # against a go.mod that targets Go 1.25 ("language version used to
          # build golangci-lint is lower than the targeted Go version").
          install-mode: goinstall
          args: --timeout 5m

  isolated-behavior-e2e:
    name: Isolated Behavior Backend E2E (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Allow unprivileged user namespaces
        # Ubuntu 23.10+ restricts unprivileged user namespaces via AppArmor;
        # relax it for this job so bwrap can create namespaces as the runner user.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true

      - name: Run isolated backend E2E tests
        env:
          # Fail (not skip) if the isolated runner reports unavailable, so this
          # job is proof the backend actually executed inside bubblewrap.
          PKGSAFE_REQUIRE_ISOLATED_E2E: "1"
        run: go test -v -run 'Isolated' ./internal/sandbox/

  pkgsafe-gate:
    name: PkgSafe Package Gate Self-Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PkgSafe Dependency Gate
        uses: ./
        with:
          # Dogfood against a CLEAN lockfile so a red gate means a real
          # regression. testdata/npm/package-lock.json intentionally contains a
          # typosquat fixture and is reserved for unit tests, not this gate.
          lockfile: testdata/npm/self-scan/package-lock.json
          fail-on: block
          changed-only: false
          sandbox: false
          upload-sarif: false

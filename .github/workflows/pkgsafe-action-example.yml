name: PkgSafe Action Example

on:
  pull_request:
    paths:
      - "package-lock.json"
      - "requirements.txt"
      - "pyproject.toml"
      - ".pkgsafe/**"
      - "default-policy.yaml"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  dependency-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PkgSafe dependency gate
        uses: ./
        with:
          lockfile: testdata/npm/self-scan/package-lock.json
          policy: default-policy.yaml
          fail-on: block
          changed-only: true
          offline: false
          upload-sarif: true
          comment-pr: true

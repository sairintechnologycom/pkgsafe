name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release + upload artifacts
  id-token: write   # keyless cosign signing via OIDC
  attestations: write

jobs:
  goreleaser:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Validate release readiness
        run: |
          go test ./...
          go vet ./...
          make build          # produces dist/pkgsafe for the validation run
          make package        # cross binaries + checksums + SBOM
          ./dist/pkgsafe test benchmark --offline

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build provenance attestation requires a public repo (or GitHub
      # Enterprise with the feature). Non-blocking so a private-beta release
      # still ships signed checksums and SBOMs; provenance resumes once public.
      - name: Attest build provenance
        if: always()
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release + upload artifacts
  id-token: write   # keyless cosign signing via OIDC
  attestations: write

jobs:
  goreleaser:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.25.0'

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Validate release readiness
        run: |
          make fmt-check
          go test ./...
          go vet ./...
          make build          # produces dist/pkgsafe for the validation run
          make package        # cross binaries + checksums + SBOM
          ./dist/pkgsafe test benchmark --offline

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: '~> v2'
          install-only: true

      - name: Run GoReleaser
        run: scripts/run-goreleaser-ci.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with contents:write on sairintechnologycom/homebrew-pkgsafe.
          # Create at: github.com/settings/tokens → Fine-grained tokens
          # Then add as a repo secret: Settings → Secrets → Actions → HOMEBREW_TAP_TOKEN
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # GitHub artifact attestations are unavailable for user-owned private
      # repositories. Beta tags may still ship signed artifacts, but GA tags
      # must fail here unless provenance can be persisted and verified.
      - name: Attest build provenance
        if: always()
        continue-on-error: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: "dist/*"

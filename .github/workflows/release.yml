name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release + upload artifacts
  id-token: write   # keyless cosign signing via OIDC
  attestations: write

jobs:
  goreleaser:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Validate release readiness
        run: |
          go test ./...
          go vet ./...
          make build          # produces dist/pkgsafe for the validation run
          make package        # cross binaries + checksums + SBOM
          ./dist/pkgsafe test benchmark --offline

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with contents:write on sairintechnologycom/homebrew-pkgsafe.
          # Create at: github.com/settings/tokens → Fine-grained tokens
          # Then add as a repo secret: Settings → Secrets → Actions → HOMEBREW_TAP_TOKEN
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # GitHub artifact attestations are unavailable for user-owned private
      # repositories. Beta tags may still ship signed artifacts, but GA tags
      # must fail here unless provenance can be persisted and verified.
      - name: Attest build provenance
        if: always()
        continue-on-error: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

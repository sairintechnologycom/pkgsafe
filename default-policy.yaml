mode: warn

thresholds:
  allow_max_score: 29
  warn_max_score: 69
  block_min_score: 70

sandbox:
  enabled: false
  default_timeout_seconds: 10
  network_mode: disabled
  keep_sandbox: false
  fail_open_when_unavailable: true

protected_paths:
  - "~/.aws"
  - "~/.azure"
  - "~/.gcp"
  - "~/.ssh"
  - "~/.kube"
  - "~/.npmrc"
  - "~/.pypirc"
  - ".env"
  - ".env.local"
  - ".vault-token"

trusted_packages:
  npm:
    - lodash
    - axios
    - react
    - express
    - typescript

blocked_packages:
  npm: []

rules:
  lifecycle_script_present:
    enabled: true
    severity: medium
    score: 20

  network_command_in_lifecycle:
    enabled: true
    severity: high
    score: 30

  credential_path_reference:
    enabled: true
    severity: critical
    score: 100

  secret_keyword_reference:
    enabled: true
    severity: high
    score: 35

  obfuscated_script:
    enabled: true
    severity: high
    score: 25

  typosquat_candidate:
    enabled: true
    severity: high
    score: 25

  missing_repository:
    enabled: true
    severity: low
    score: 10

  missing_license:
    enabled: true
    severity: low
    score: 5

  new_package:
    enabled: true
    severity: medium
    score: 15
    max_age_days: 14

  trusted_package_reduction:
    enabled: true
    severity: informational
    score: -20

  known_vulnerability_critical:
    enabled: true
    severity: critical
    score: 70

  known_vulnerability_high:
    enabled: true
    severity: high
    score: 50

  known_vulnerability_medium:
    enabled: true
    severity: medium
    score: 25

  known_vulnerability_low:
    enabled: true
    severity: low
    score: 10

  known_malware_indicator:
    enabled: true
    severity: critical
    score: 100

  ai_package_squatting_candidate:
    enabled: true
    severity: high
    score: 25

  ai_agent_requested_suspicious_package:
    enabled: true
    severity: high
    score: 15

  credential_canary_read:
    enabled: true
    severity: critical
    score: 100

  credential_canary_exfiltration_attempt:
    enabled: true
    severity: critical
    score: 100

  cloud_metadata_access:
    enabled: true
    severity: critical
    score: 100

  npm_token_access:
    enabled: true
    severity: critical
    score: 100

  ssh_key_access:
    enabled: true
    severity: critical
    score: 100

  env_secret_access:
    enabled: true
    severity: critical
    score: 100

  network_call_from_lifecycle:
    enabled: true
    severity: high
    score: 40

  shell_download_execute:
    enabled: true
    severity: critical
    score: 100

  encoded_payload_execution:
    enabled: true
    severity: high
    score: 40

  unexpected_binary_write:
    enabled: true
    severity: high
    score: 30

  child_process_spawn:
    enabled: true
    severity: medium
    score: 20

  home_directory_enumeration:
    enabled: true
    severity: medium
    score: 20

  environment_variable_enumeration:
    enabled: true
    severity: medium
    score: 20

mcp:
  enabled: true
  default_mode: warn
  ai_agent_default_install_allowed_on_warn: false
  human_default_install_allowed_on_warn: true

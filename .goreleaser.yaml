# GoReleaser configuration for pkgsafe.
# Docs: https://goreleaser.com
version: 2

project_name: pkgsafe

before:
  hooks:
    - go mod tidy

builds:
  - id: pkgsafe
    main: ./cmd/pkgsafe
    binary: pkgsafe
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sairintechnologycom/pkgsafe/internal/version.Version={{ .Version }}
      - -X github.com/sairintechnologycom/pkgsafe/internal/version.Commit={{ .ShortCommit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM per archive (requires syft on the runner).
sboms:
  - artifacts: archive

# Keyless cosign signing of the checksums file (requires cosign + OIDC).
# Verify with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/.*/pkgsafe/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    certificate: "${artifact}.pem"
    output: true
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

release:
  draft: true
  prerelease: auto
  # Attach the remote install script to every release as install.sh so
  # https://github.com/sairintechnologycom/pkgsafe/releases/latest/download/install.sh
  # always resolves (served by the release CDN, no raw/API rate limits).
  extra_files:
    - glob: ./scripts/install-remote.sh
      name_template: install.sh

# ── Homebrew tap ─────────────────────────────────────────────────────────────
# On every tagged release GoReleaser pushes an updated formula to the tap.
# Required secret: HOMEBREW_TAP_TOKEN — fine-grained PAT with:
#   - Repository: sairintechnologycom/homebrew-pkgsafe
#   - Permissions: Contents (read & write)
# Add it at: Settings → Secrets → Actions in the pkgsafe repo.
brews:
  - name: pkgsafe
    repository:
      owner: sairintechnologycom
      name: homebrew-pkgsafe
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: pkgsafe-bot
      email: bot@sairintechnology.com
    commit_msg_template: "feat: bump pkgsafe to {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/sairintechnologycom/pkgsafe"
    description: "Supply-chain security scanner for npm, PyPI, Cargo, and Go packages"
    license: "Apache-2.0"
    test: |
      output = shell_output("#{bin}/pkgsafe version 2>&1")
      assert_match version.to_s, output
    install: |
      bin.install "pkgsafe"


changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
